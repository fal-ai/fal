name: Run isolate-proto tests

on:
  push:
    branches:
      - main
    paths:
      - "projects/isolate_proto/**"
      - ".github/workflows/tests-isolate-proto.yml"
  pull_request:
    paths:
      - "projects/isolate_proto/**"
      - ".github/workflows/tests-isolate-proto.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip wheel
          pip install -e 'projects/isolate_proto[test]'

      - name: Run tests
        run: |
          pytest -n auto -v projects/isolate_proto/tests
