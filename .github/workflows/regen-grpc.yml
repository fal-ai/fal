name: Regenerate gRPC bindings

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "projects/isolate_proto/**/*.proto"
      - "tools/regen_grpc.py"
      - "tools/pyproject.toml"
  workflow_dispatch:
    inputs:
      isolate_version:
        description: "fal-ai/isolate tag to clone (without leading 'v'). If empty, the latest tag is used."
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    # Auto-commit only works for branches in the same repo. Fork PRs don't
    # have access to secrets anyway, so we skip them entirely.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Mint GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REGEN_APP_ID }}
          private-key: ${{ secrets.REGEN_APP_PRIVATE_KEY }}
          owner: fal-ai
          repositories: |
            fal
            isolate

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          # App token so the auto-commit re-triggers downstream workflows
          # (the default GITHUB_TOKEN suppresses on-push events).
          token: ${{ steps.app_token.outputs.token }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Configure git auth for private fal-ai/isolate clone
        env:
          APP_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          # Inject token for any https://github.com/ clone (regen_grpc.py does
          # its own `git clone` of fal-ai/isolate).
          git config --global url."https://x-access-token:${APP_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Determine isolate version
        id: isolate_version
        env:
          INPUT_VERSION: ${{ inputs.isolate_version }}
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            version="${INPUT_VERSION}"
          else
            # Latest tag from the private isolate repo.
            version=$(gh api repos/fal-ai/isolate/tags --jq '.[0].name' | sed 's/^v//')
          fi
          if [ -z "${version}" ]; then
            echo "::error::Could not determine isolate version."
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Using isolate version: ${version}"

      - name: Install isolate_proto[dev] (provides regen tooling)
        run: |
          python -m pip install --upgrade pip
          pip install -e 'projects/isolate_proto[dev]'

      - name: Regenerate gRPC bindings
        working-directory: projects/isolate_proto
        run: |
          python ../../tools/regen_grpc.py --isolate-version "${{ steps.isolate_version.outputs.version }}"

      - name: Run pre-commit on regenerated files
        continue-on-error: true
        run: |
          pip install pre-commit
          pre-commit run --all-files || true

      - name: Commit regenerated files back to the PR
        env:
          ISOLATE_VERSION: ${{ steps.isolate_version.outputs.version }}
          APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
        run: |
          if [ -z "$(git status --porcelain projects/isolate_proto)" ]; then
            echo "No changes after regeneration."
            exit 0
          fi

          # Author the commit as the GitHub App's bot user.
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"

          git add projects/isolate_proto
          git commit -m "chore(isolate_proto): regenerate gRPC bindings (isolate v${ISOLATE_VERSION})"
          git push
