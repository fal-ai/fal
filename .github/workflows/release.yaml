name: PyPI release
run-name: PyPI release ${{ inputs.tag || github.ref }}

on:
  release:
    types:
    - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (see create-release workflow)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      name: ${{ steps.parse.outputs.name }}
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@e9aba2c848f5ebd159c070c61ea2c4e2b122355e # v2.3.4
        with:
          python-version: "3.9"

      - name: Parse tag
        id: parse
        env:
          TAG: ${{ github.event.inputs.tag || github.ref }}
        run: |
          regex="^(refs/tags/)?(.*)_v(.*)$"
          [[ $TAG =~ $regex ]] || exit 1
          name=${BASH_REMATCH[2]}
          version=${BASH_REMATCH[3]}
          echo "Parsed name=$name version=$version"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install deps
        run: python -m pip install --upgrade pip setuptools_scm build

      - name: Build
        working-directory: projects/${{ steps.parse.outputs.name }}
        run: python -m build

      - name: Upload dist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: projects/${{ steps.parse.outputs.name }}/dist

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/${{ needs.build.outputs.name }}
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  release-container:
    if: ${{ needs.build.outputs.name == 'fal' }}
    uses: ./.github/workflows/container.yml
    needs: build
    with:
      version: ${{ needs.build.outputs.version }}
